# contextd configuration file

[server]
host = "127.0.0.1"
port = 8080
# Enable compression for responses
compression = true

[storage]
# Storage backend: "sqlite" or "postgres"
type = "sqlite"
# Database connection string
sqlite_path = "./data/contextd.db"
# postgres_url = "postgresql://user:pass@localhost/contextd"

# Enable LZ4 compression for stored transcripts
compression = true

[search]
# Search engine configuration
engine = "tantivy"
# Index directory
index_path = "./data/index"
# Enable vector search (requires vector-search feature)
vector_search = false
# Vector dimension (if using vector search)
vector_dimension = 384

[policy]
# Default retention period in days
default_retention_days = 90
# Maximum results per search query
max_results_per_query = 100
# Maximum transcript size in bytes
max_transcript_size = 1048576  # 1MB

[audit]
# Enable audit logging
enabled = true
# Audit log retention period in days
retention_days = 365
# Audit log file path
log_path = "./data/audit.log"

[ranking]
# Hybrid search ranking weights (must sum to 1.0)
bm25_weight = 0.6
semantic_weight = 0.3
temporal_weight = 0.1
# Temporal decay factor (higher = more recent bias)
temporal_decay_factor = 0.1

[limits]
# Rate limiting (requests per minute per API key)
rate_limit_per_minute = 100
# Maximum concurrent connections
max_connections = 1000
# Request timeout in seconds
request_timeout_seconds = 30
