services:
  contextd:
    build:
      context: .
      args:
        VERSION: "${VERSION:-dev}"
    container_name: contextd
    ports:
      - "8080:8080"
    volumes:
      - contextd_data:/var/lib/contextd
      # Uncomment to mount a custom config (overrides the built-in container default):
      # - ./contextd.yaml:/etc/contextd/contextd.yaml:ro
    environment:
      - CONTEXTD_LOG_LEVEL=info
      # Set OPENAI_API_KEY here if using the openai embedder:
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  contextd_data:
    driver: local
